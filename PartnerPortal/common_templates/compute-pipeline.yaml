        CloudWatchLogs:
          Status: ENABLED
          # GroupName: !Sub ${CodeBuildCIBFFProjectName}-CloudWatchLogs-BuildLogGroup-Name
      TimeoutInMinutes: 15
  TriggerPipelineOnSuccessSource:
    Type: bbbbbbbbbbbbbb
    Properties:
      Description: match to success codebuild project
      EventPattern:
        source:
          - "aws.codebuild"
        detail-type:
          - "CodeBuild Build State Change"
        detail:
          build-status:
            - "SUCCEEDED"
          project-name:
            - !Ref CodeBuildPPFESource
      # RoleArn: !GetAtt EventsRole.Arn
      State: ENABLED
      Targets:
        - Arn: fffffffffffffffffff
          Id: hhhhhhhhhhhhhhhhhhh
