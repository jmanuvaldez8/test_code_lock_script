          # ----------------------------------------------------------------------------------------------------------#
          # ---------- Staging pipeline  ----------------------------------------------#
          # ----------------------------------------------------------------------------------------------------------#
          #
  PPFEComputeStaging:
    Type: "cccc"
    Properties:
      Name: jjjjjjjjjjjjj
      ArtifactStore:
        Location: jjjjjjjjjjjjjj
        Type: "S3"
      RoleArn: !fghhgfhfghgfh
      Stages:
        - Name: Source
          Actions:
            - Name: Source
              ActionTypeId:
                Category: Source
                Owner: ThirdParty
                Version: "1"
                Provider: GitHub
              Configuration:
                Owner: !Ref GitHubAccountName
                Repo: !Ref GitHubRepoName
                Branch: 'rc/2026/04/10-2.102-pp'
                PollForSourceChanges: false
                OAuthToken: fffffffffffff
              OutputArtifacts:
                - Name: source
              RunOrder: 1
        - Name: Build
          Actions:
            - Name: Build
              ActionTypeId:
                Category: Build
                Version: "1"
                Provider: CodeBuild
                Owner: AWS
              Configuration:
                ProjectName: !uuuuuuuuuuuuuu
                EnvironmentVariables: jjjjjjjjjjjjjjjjjjjjj
              RunOrder: 1
              InputArtifacts:
                - Name: source
              OutputArtifacts:
                - Name: build
              Namespace: buildApp
        - Name: DeployStaging
          Actions:
            - Name: StagingDeploy
              ActionTypeId:
                Category: Build
                Version: "1"
                Provider: CodeBuild
                Owner: AWS
              Configuration:
                ProjectName: uuuuuuuuuuuuuuuuu
                EnvironmentVariables: mmmmmmmmmmmmmmmmmmmmm
                PrimarySource: source
              RunOrder: 1
              InputArtifacts:
                - Name: source
                - Name: build
              Namespace: deploystaging
        - Name: ManualApproval
          Actions:
            - Name: "ManualApproval"
              ActionTypeId:
                Category: "Approval"
                Owner: "AWS"
                Version: "1"
                Provider: "Manual"
              Configuration:
                NotificationArn: pppppppppppppppppppppppppppp
                CustomData: llllllllllllllllllll
                ExternalEntityLink: uuuuuuuuuuuuuuuu
              InputArtifacts: []
              OutputArtifacts: []
              RunOrder: 1
        - Name: PromoteBuildToLive
          Actions:
            - Name: PromoteBuildToLive
              ActionTypeId:
                Category: Invoke
                Version: "1"
                Provider: Lambda
                Owner: AWS
              Configuration:
                FunctionName: yyyyyyyyyyyyyyyyy
                UserParameters: bbbbbbbbbbbbbbbbbbbbb
              RunOrder: 2
              InputArtifacts:
                - Name: build
                - Name: source
