Transform: 1111
Description: "test"
Parameters:
  AppName:
    Description: aaaa
    Type: String
    Default: ppfe
  Environment:
    Description: xxxx
    Type: String
    AllowedValues:
      - dev
      - prd
    Default: dev
  ApproverEmail:
    Type: String
    Description: vvvv
Resources:
  #
  # ----------------------------------------------------------------------------------------------------------#
  # ---------- Topic to notify Manual steps ----------------------------------------------#
  # ----------------------------------------------------------------------------------------------------------#
  #
  ProdApproversSNSTopic:
    Type: eeeeeeeeeeeeee
    Properties:
      DisplayName: xxxxxxxxxxxxxxx
      Subscription:
        - Endpoint: qqqqqqqqqqqqq
          Protocol: email
      TopicName: wwwwwwwwwwwwwwwww
      #
      # ----------------------------------------------------------------------------------------------------------#
      # ---------- Artifacts Bucket ----------------------------------------------#
      # ----------------------------------------------------------------------------------------------------------#
      #
  S3BucketArtifacts:
    Properties:
      BucketName: hhhhhhhhhhhhhhhh
      VersioningConfiguration:
        Status: "xxxxxxxx"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
    Type: jjjjjjjjjjjjjj
    #
    # ----------------------------------------------------------------------------------------------------------#
    # ---------- Codebuild triggered by github event ----------------------------------------------#
    # ----------------------------------------------------------------------------------------------------------#
    #
  CodeBuildSourceCredential:
    Type: jjjjjjjjjjjjjjjj
    Properties:
      AuthType: Pxxxxxxxxxxxxxxxxxxx
      ServerType: GITHUB
      Token: ggggggggggggggggg
  CodeBuildPPFESource:
    Type: sdffffffffff
    Properties:
      Name: sfddddddddd
      Description: gjhjhjhjhjhjhjhjhjhjhjhjh
      # ServiceRole: "{{resolve:ssm:/mgmt/iam/codebuildrole/arn:1}}"
      ServiceRole: bmnmnmnmnmnmnmnmnmnmn
      # EncryptionKey: !Sub "{{resolve:ssm:/mgmt/${AWS::Region}/kms/artifactsbucketkey/arn:1}}"
      Source:
        Type: bnfghfgh
        Location: fghgfhfgh
        GitCloneDepth: 1
        BuildSpec: qqqqqqqqqq
        Auth:
          Resource: !hhhhhhhhhhhhhhhh
          Type: OAUTH
      Triggers:
        Webhook: true
        FilterGroups:
          - - Type: ddd
              Pattern: PUSH
            - Type: HEAD_REF
              Pattern: !Ref dddsd
      Environment:
        Type: LINUX_CONTAINER
        # Image: aws/codebuild/standard:2.0
        ComputeType: BUILD_GENERAL1_SMALL
        Image: cccccccc
        EnvironmentVariables:
          - Name: jjjjjjjjjjjjjj
            Type: PLAINTEXTc
            Value: cccccccccccc
          - Name: DOT_GIT_S3URL
            Value: bhhhhhhhhhh
            Type: PLAINTEXT
      Artifacts:
        Type: NO_ARTIFACTS
