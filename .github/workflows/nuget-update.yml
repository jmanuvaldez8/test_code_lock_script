name: Nuget Uupdatge

on:
  workflow_dispatch:
    inputs:
      pe-stable:
        description: "Update Payment Engine to Stable?"
        required: true
        default: "Yes"
        type: choice
        options:
          - "Yes"
          - "No"

permissions:
  contents: write
  pull-requests: write
  repository-projects: write

jobs:
  create-rc:
    runs-on: ubuntu-latest
    
      
    steps:
      - name: Checkout repos
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: List files for debugging
        run: find . -name "*.vbproj"          

      - name: Install Update Tool
        run: dotnet tool install --global dotnet-outdated-tool

      - name: Run Update Check and Install
        # -u: Updates the Directory.Packages.props file
        # -vl Major: Allows updating to the latest Major version
        # --inc xAws: Limits scope to packages used by xAws.vbproj
        run: dotnet outdated src/core/xAWS/ -u -vl Major

      - name: Verify Build
        # Ensures the update didn't break the VB project
        run: dotnet build src/core/xAWS/xAWS.vbproj --configuration Release      

        
          
