name: Nuget Uupdatge

on:
  workflow_dispatch:
    inputs:
      pe-stable:
        description: "Update Payment Engine to Stable?"
        required: true
        default: "Yes"
        type: choice
        options:
          - "Yes"
          - "No"

permissions:
  contents: write
  pull-requests: write
  repository-projects: write

jobs:
  create-rc:
    runs-on: ubuntu-latest
    
      
    steps:
      - name: Checkout repos
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      #- name: List files for debugging
      #  run: find . -name "*.vbproj"          

      #- name: Install Update Tool
      #  run: dotnet tool install --global dotnet-outdated-tool

      - name: Report Outdated Packages
        run: dotnet list src/core/xAWS/xAWS.vbproj package --outdated

      - name: Update NuGet dependencies in xAws.vbproj & update IDTechSDK_STD)
        run: |
          PATCH_BRANCH="UpdateNugetPackages-$(date +%Y%m%d-%H%M%S)"
          
          git fetch origin main
          git checkout main

          echo "Checking out new branch: $PATCH_BRANCH"          
          git checkout -b $PATCH_BRANCH
          
          PROJ="src/core/xAWS/xAWS.vbproj"          
          PROPS="src/core/xAWS/Directory.Packages.props"

          echo "Checking for updates in $PROJ..."

          # 1. Get the list, skip headers, and extract Name and Latest version
          # The awk script looks for lines with 5+ columns (standard for outdated output)
          # and avoids the header lines.
          #updates=$(dotnet list $PROJ package --outdated | awk 'NR > 2 && $NF ~ /[0-9]/ {print $2, $NF}')

          updates=$(dotnet list $PROJ package --outdated | \
                    grep -ivE "^Updating|http|\[.*\]" | \
                    awk '$2 != "" && $NF ~ /[0-9]\.[0-9]/ {print $2, $NF}')

          if [ -z "$updates" ]; then
            echo "All packages are up to date."
            exit 0
          fi

          echo "Found updates. Applying to $PROPS..."
          echo "$updates" | while read -r name latest; do
            # Sanity check: Ensure we aren't trying to update a URL as a package
            if [[ $name == http* ]] || [[ $name == *"/"* ]]; then
               continue
            fi

            echo "Updating $name to $latest"
            
            # Escape the name for sed to be safe
            sed -i "s/\(<PackageVersion [^>]*Include=\"$name\" [^>]*Version=\"\)[^\"]*\(\"\)/\1$latest\2/g" "$PROPS"

            git add $PROPS
            git commit -m "Update Nuget packages"
            git push origin $PATCH_BRANCH   
          done
