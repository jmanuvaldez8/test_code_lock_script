name: Nuget Uupdatge

on:
  workflow_dispatch:
    inputs:
      pe-stable:
        description: "Update Payment Engine to Stable?"
        required: true
        default: "Yes"
        type: choice
        options:
          - "Yes"
          - "No"

permissions:
  contents: write
  pull-requests: write
  repository-projects: write

jobs:
  create-rc:
    runs-on: ubuntu-latest
    
      
    steps:
      - name: Checkout repos
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Update NuGet dependencies in xAws.vbproj & update IDTechSDK_STD)
        run: |
          git checkout main
          git pull origin main

          PROJ="src/core/xCore/xAws.vbproj"

          if [ -f "$PROJ" ]; then
            echo "Updating NuGet packages in $PROJ..."

            # List outdated packages (JSON format)
            packages=$(dotnet list "$PROJ" package --outdated --include-transitive --format json | \
                       jq -r '.Outdated[] | .Name')

            for pkg in $packages; do
              echo "Updating $pkg to latest"
              dotnet add "$PROJ" package "$pkg"
            done

            # Explicitly update IDTechSDK_STD to latest
            echo "Updating IDTechSDK_STD to latest"
            dotnet add "$PROJ" package IDTechSDK_STD --version *

            git add "$PROJ"
            git commit -m "Update NuGet dependencies in xAws.vbproj update IDTechSDK_STD)" || echo "No changes"
            git push origin master
          else
            echo "$PROJ not found"
          fi          
          
