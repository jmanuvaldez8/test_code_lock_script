name: Lock Code

on:
  workflow_dispatch:
    inputs:
      pe-stable:
        description: "Update Payment Engine to Stable?"
        required: true
        default: "Yes"
        type: choice
        options:
          - "Yes"
          - "No"

  push:
    branches:
      - "mvaldez-ck-patch-1" 

permissions:
  contents: write
  pull-requests: write
  repository-projects: write

jobs:
  create-rc:
    runs-on: ubuntu-latest
    
      
    steps:
      - name: Checkout repos
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"      

      - name: Update .mergify.yml workflow in master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}        
        run: |
          PREVIOUS_RC_BRANCH="${{ vars.PREVIOUS_RC_BRANCH }}"
          CURRENT_RC_BRANCH="${{ vars.CURRENT_RC_BRANCH }}"
          PATCH_BRANCH="UpdateMergifyWorkflowMaster-$(date +%Y%m%d-%H%M%S)"
          
          git fetch origin main
          git checkout main

          echo "Checking out new branch: $PATCH_BRANCH"          
          git checkout -b $PATCH_BRANCH

          FILE="lock_code_test_folder/.mergify.yml"

          if [ -f "$FILE" ]; then
            echo "Updating $FILE"

            # This update the 'branches' key and for backport
            #yq -i 'del(.on.push)' $FILE
            #yq -i '.pull_request_rules.database.host = "localhost"' $FILE
            # Updates the 'image' value only for the entry where 'name' is 'nginx'
            yq -i '(.pull_request_rules[] | select(.name == "backport to rc")).actions.backport.branches[0] = "${{ vars.CURRENT_RC_BRANCH }}"' $FILE
            yq -i '(.pull_request_rules[] | select(.name == "backport to penultimate rc")).actions.backport.branches[0] = "${{ vars.PREVIOUS_RC_BRANCH }}"' $FILE
            #yq -i '(.pull_request_rules[] | select(.name == "backport to rc")).actions.backport.branches[0] = "${{ github.event.inputs.new_version }}"' .mergify.yml

            git add $FILE
            git commit -m "Disable publish triggers on previous RC branch" || echo "No changes"
            git push origin $PATCH_BRANCH
          else
            echo "$FILE not found"
          fi

          #Update the version number for PaymentEngine in Master
          FUTURE_VERSION="${{ vars.FUTURE_VERSION }}"
          FILE="lock_code_test_folder/xVersion.vb"
          sed -i 's/\(Public Const MyAssemblyVersionCore As String.*=\).*/\1 "$FUTURE_VERSION"/' $FILE          
          
          git add $FILE
          git commit -m "Set MyAssemblyVersionCore to future version"
          git push origin $PATCH_BRANCH
          
          # 4. Create the Pull Request using GitHub CLI
          gh pr create \
          --title "Automated YAML Update" \
          --body "This PR was created using the gh cli in a GitHub Action." \
          --base main \
          --head $PATCH_BRANCH
