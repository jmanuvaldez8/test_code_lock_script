pull_request_rules:
  - name: backport to rc
    conditions:
      - base=master
      - label=backport to last rc
    actions:
      backport:
        branches:
          - rc/2026/04/10-2.104-pp
        labels:
          - backported
        label_conflicts: backport conflict
        assignees:
          - "{{author}}"
  - name: backport to penultimate rc
    conditions:
      - base=master
      - label=backport to second-last rc
    actions:
      backport:
        branches:
          - rc/2026/04/10-2.103-pp
        labels:
          - backported
        label_conflicts: backport conflict
        assignees:
          - "{{author}}"
  - name: message on build check failure
    conditions:
      - check-failure=build
      - -closed
